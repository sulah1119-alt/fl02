# fl02<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>고설아 포트폴리오</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial'; }
    body { background:#f5f7fa; overflow-x:hidden; }

    .container {
      display:flex;
      height:100vh;
    }

    .left {
      width:50%;
      background:linear-gradient(135deg,#6a8dff,#3f5bd5);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .left img {
      width:70%;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .right {
      width:50%;
      padding:80px;
      background:white;
    }

    h1 {
      font-size:48px;
      color:#3f5bd5;
      margin-bottom:20px;
      opacity:0;
    }

    .info {
      margin-bottom:40px;
      opacity:0;
    }

    .info p {
      font-size:18px;
      margin-bottom:10px;
    }

    .cards {
      display:flex;
      gap:20px;
    }

    .card {
      flex:1;
      padding:20px;
      border-radius:15px;
      background:#f0f3ff;
      text-align:center;
      opacity:0;
      transform:translateY(50px);
    }

    .card h3 {
      margin-bottom:10px;
      color:#3f5bd5;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="left">
    <img src="/mnt/data/c1156e80-2e9e-408c-bf05-549739121921.png" alt="portfolio">
  </div>

  <div class="right">
    <h1>PORTFOLIO</h1>

    <div class="info">
      <p><strong>이름:</strong> 고설아</p>
      <p><strong>학교:</strong> 신구대학교</p>
      <p><strong>학년:</strong> 1학년</p>
    </div>

    <div class="cards">
      <div class="card">
        <h3>나에 대해</h3>
        <p>성실하고 배우는 것을 좋아합니다.</p>
      </div>
      <div class="card">
        <h3>전공</h3>
        <p>회계세무학과</p>
      </div>
      <div class="card">
        <h3>목표</h3>
        <p>회계세무사</p>
      </div>
    </div>

  </div>
</div>

<script>
  gsap.to("h1", {opacity:1, y:0, duration:1, delay:0.5});
  gsap.to(".info", {opacity:1, y:0, duration:1, delay:1});
  gsap.to(".card", {
    opacity:1,
    y:0,
    duration:1,
    stagger:0.3,
    delay:1.5
  });
</script>

</body>
</html>
